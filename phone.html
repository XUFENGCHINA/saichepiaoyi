<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Apos · 液态星云</title>
  <style>
    :root {
      --bg-deep: #1a1a3e; --bg-darker: #0a0a1a;
      --glass-bg: rgba(20,20,35,0.7); --glass-border: rgba(255,255,255,0.25);
      --notification-bg: rgba(20,20,40,0.9);
      --settings-bg: linear-gradient(140deg, rgba(255,255,255,0.32), rgba(255,255,255,0.08));
      --splash-gradient: radial-gradient(circle at center, #1a1a3e 0%, #0a0a1a 100%);
      --wallpaper-gradient: radial-gradient(ellipse at 50% 30%, #1a1a3e 0%, #0a0a1a 70%);
    }
    .dark-mode {
      --bg-deep: #0d0d1a; --bg-darker: #050510;
      --glass-bg: rgba(10,10,25,0.8); --glass-border: rgba(200,200,255,0.15);
      --notification-bg: rgba(10,10,25,0.95);
      --settings-bg: linear-gradient(140deg, rgba(30,30,60,0.6), rgba(10,10,30,0.9));
      --splash-gradient: radial-gradient(circle at center, #0d0d2a 0%, #050510 100%);
      --wallpaper-gradient: radial-gradient(ellipse at 50% 30%, #0d0d2a 0%, #050510 70%);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#000}
    #app{position:fixed;top:0;left:0;width:100%;height:100%;user-select:none;-webkit-user-select:none}
    #splashScreen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:999;background:var(--splash-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1),opacity 0.8s}
    #splashScreen.exit-animation{transform:translateY(-100%);opacity:0}
    #splashCanvas{width:100%;height:100%;position:absolute}
    .splash-text{z-index:10;color:white;text-align:center;transition:opacity 1s ease}
    .splash-text .title{font-size:4rem;font-weight:300;letter-spacing:8px;text-shadow:0 0 30px rgba(100,150,255,0.8);animation:titleGlow 2s ease-in-out infinite alternate}
    .splash-text .welcome{font-size:1.5rem;margin-top:20px;opacity:0.9}
    @keyframes titleGlow{from{text-shadow:0 0 20px rgba(100,150,255,0.6)}to{text-shadow:0 0 40px rgba(100,150,255,1),0 0 80px rgba(100,150,255,0.6)}}
    .particle-wallpaper{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--wallpaper-gradient);z-index:0}
    canvas#particleCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #lockScreen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:25vh;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
    .lock-blur{position:absolute;top:0;left:0;width:100%;height:100%;backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);background:rgba(0,0,0,0.15);z-index:-1}
    .lock-content{text-align:center;color:white;text-shadow:0 4px 20px rgba(0,0,0,0.6);z-index:1}
    .lock-time{font-size:5em;font-weight:200;letter-spacing:4px}
    .lock-date{font-size:1.2em;margin-top:12px;opacity:0.9}
    #desktop{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column}
    .desktop-scroll{flex:1;overflow-x:auto;overflow-y:hidden;white-space:nowrap;scroll-snap-type:x mandatory;padding-bottom:100px}
    .desktop-page{display:inline-flex;flex-wrap:wrap;justify-content:flex-start;align-items:flex-start;gap:24px 20px;padding:30px 20px;width:100%;height:100%;white-space:normal;scroll-snap-align:start;vertical-align:top}
    .app-icon{display:flex;flex-direction:column;align-items:center;cursor:pointer;width:80px;transition:transform 0.15s;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.4));position:relative}
    .app-icon:active{transform:scale(0.88)}
    .icon-img{width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,0.18);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 8px 20px rgba(0,0,0,0.3)}
    .app-icon span{margin-top:8px;font-size:0.75em;color:white;text-shadow:0 2px 6px rgba(0,0,0,0.8);max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .delete-btn{position:absolute;top:-8px;right:-8px;width:22px;height:22px;background:#ff3b30;border-radius:50%;color:white;display:none;align-items:center;justify-content:center;font-size:14px;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,0.5)}
    .dock{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);width:max-content;padding:8px 16px;background:var(--glass-bg);backdrop-filter:blur(25px) saturate(180%);-webkit-backdrop-filter:blur(25px) saturate(180%);border-radius:28px;border:1px solid var(--glass-border);box-shadow:0 10px 30px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.2);display:flex;justify-content:center;align-items:center;gap:12px;z-index:20}
    .dock-item{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:all 0.2s;border:1px solid rgba(255,255,255,0.2)}
    .dock-item:active{transform:scale(0.9);background:rgba(255,255,255,0.25)}
    #fullscreenContainer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:rgba(0,0,0,0.4);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);display:flex;flex-direction:column;overflow:hidden;border-radius:0}
    #fullscreenContent{flex:1;width:100%;height:100%;overflow:hidden}
    #fullscreenContent iframe{width:100%;height:100%;border:none;background:#000}
    .nav-trigger{position:absolute;bottom:0;left:0;right:0;height:22px;z-index:50;background:rgba(255,255,255,0.02)}
    .nav-bar{position:absolute;bottom:0;left:0;right:0;height:60px;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;gap:16px;transform:translateY(100%);transition:transform 0.3s;z-index:51}
    .nav-bar.visible{transform:translateY(0)}
    .nav-exit-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:10px 30px;border-radius:30px;font-size:1rem;font-weight:600;cursor:pointer}
    .notification-panel{position:fixed;top:0;left:0;right:0;background:var(--notification-bg);backdrop-filter:blur(30px);padding:50px 20px 20px;z-index:400;transform:translateY(-100%);transition:transform 0.35s;border-radius:0 0 24px 24px}
    .notification-panel.open{transform:translateY(0)}
    #settingsPanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:88%;max-width:380px;background:var(--settings-bg);backdrop-filter:blur(36px);border-radius:26px;border:1px solid rgba(255,255,255,0.3);padding:24px;z-index:300;color:white;display:flex;flex-direction:column;gap:18px}
    .hidden{display:none!important}
    .glass-btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:white;padding:10px 18px;border-radius:40px;cursor:pointer;backdrop-filter:blur(12px);font-size:0.9em;font-weight:500;text-align:center}
    #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);color:white;padding:12px 24px;border-radius:30px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
  </style>
</head>
<body>
<div id="app">
  <div id="splashScreen"><canvas id="splashCanvas"></canvas><div class="splash-text" id="splashText" style="opacity:0;"><div class="title">Apos</div><div class="welcome">你好，欢迎回家</div></div></div>
  <div class="particle-wallpaper" id="particleWallpaper"><canvas id="particleCanvas"></canvas></div>
  <div id="lockScreen" class="hidden"><div class="lock-blur"></div><div class="lock-content"><div class="lock-time" id="lockTime">12:00</div><div class="lock-date" id="lockDate">2026年6月18日 周四</div></div></div>
  <div id="desktop" class="hidden">
    <div class="desktop-scroll" id="desktopScroll"><div class="desktop-page" id="desktopPage1"></div><div class="desktop-page" id="desktopPage2"></div></div>
    <div class="dock" id="dockBar"><div class="dock-item" data-app="settings">⚙️</div><div class="dock-item" data-app="store">🛒</div><div class="dock-item" data-app="browser">🌐</div><div class="dock-item" data-app="feixin">💬</div></div>
  </div>
  <div class="notification-panel" id="notificationPanel">
    <div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="glass-btn" id="toggleParticles">✨ 粒子</button><button class="glass-btn" id="toggleDarkMode">🌓 深色</button><button class="glass-btn" id="forceExitBtn" style="background:rgba(255,80,80,0.4);">🚪 强制退出</button></div>
  </div>
  <div id="fullscreenContainer" class="hidden"><div id="fullscreenContent"></div><div class="nav-trigger" id="navTrigger"></div><div class="nav-bar" id="navBar"><button class="nav-exit-btn" id="navExitBtn">退出</button></div></div>
  <div id="settingsPanel" class="hidden">
    <div style="font-size:1.3em;font-weight:600;text-align:center;">⚙️ 设置</div>
    <div><label style="opacity:0.8;">壁纸</label><button class="glass-btn" id="changeWallpaperBtn">选择图片</button></div>
    <div><label style="opacity:0.8;">模糊度: <span id="blurValue">28</span>px</label><input type="range" id="blurSlider" min="5" max="40" value="28" style="width:100%;"></div>
    <button class="glass-btn" id="closeSettingsBtn">关闭</button>
    <input type="file" id="wallpaperInput" accept="image/*" hidden>
  </div>
  <div id="overlay" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:150;"></div>
  <input type="file" id="appFileInput" accept=".html,.htm" hidden>
  <div id="toast">软件已安装成功</div>
  <div id="customInstallModal" class="hidden" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,40,0.95);backdrop-filter:blur(20px);border-radius:20px;padding:20px;color:white;z-index:400;display:flex;flex-direction:column;gap:12px;width:90%;max-width:320px;">
    <h3>自定义安装</h3>
    <input type="text" id="customAppName" placeholder="应用名称" value="未命名">
    <div id="emojiGrid" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    <div style="display:flex;gap:8px;"><button class="glass-btn" id="confirmCustomInstall">确认安装</button><button class="glass-btn" id="cancelCustomInstall">取消</button></div>
  </div>
</div>
<script>
(function() {
  // ========== 光纤粒子启动动画 ==========
  var splashCanvas = document.getElementById('splashCanvas');
  var splashCtx = splashCanvas.getContext('2d');
  var splashScreen = document.getElementById('splashScreen');
  var splashText = document.getElementById('splashText');
  splashCanvas.width = window.innerWidth;
  splashCanvas.height = window.innerHeight;
  var particles = [];
  var MAX_PARTICLES = 150;
  function FiberParticle(x, y) {
    this.x = x; this.y = y;
    var angle = Math.random() * Math.PI * 2;
    var speed = 3 + Math.random() * 8;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.radius = 1.5 + Math.random() * 2.5;
    this.color = 'hsl(' + (Math.random() * 60 + 200) + ',100%,' + (Math.random() * 50 + 50) + '%)';
    this.alpha = 1;
    this.decay = 0.002 + Math.random() * 0.008;
    this.trail = [];
    this.trailLength = 8 + Math.floor(Math.random() * 12);
  }
  FiberParticle.prototype.update = function() {
    this.x += this.vx; this.y += this.vy;
    this.alpha -= this.decay;
    this.trail.push({x: this.x, y: this.y, alpha: this.alpha});
    if (this.trail.length > this.trailLength) this.trail.shift();
    if (this.x < 0 || this.x > splashCanvas.width) this.vx *= -0.8;
    if (this.y < 0 || this.y > splashCanvas.height) this.vy *= -0.8;
  };
  FiberParticle.prototype.draw = function(ctx) {
    for (var i = 0; i < this.trail.length; i++) {
      var t = this.trail[i];
      var ratio = i / this.trail.length;
      ctx.globalAlpha = this.alpha * ratio * 0.6;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.radius * ratio, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
  };
  function explodeFiber() {
    var cx = splashCanvas.width / 2, cy = splashCanvas.height / 2;
    for (var i = 0; i < MAX_PARTICLES; i++) particles.push(new FiberParticle(cx, cy));
  }
  var explosionCount = 0;
  function startExplosions() {
    if (explosionCount >= 3) {
      splashText.style.opacity = '1';
      setTimeout(function() {
        splashScreen.classList.add('exit-animation');
        splashScreen.addEventListener('transitionend', function handler() {
          splashScreen.removeEventListener('transitionend', handler);
          splashScreen.classList.add('hidden');
          document.getElementById('lockScreen').classList.remove('hidden');
        });
      }, 3000);
      return;
    }
    explodeFiber();
    explosionCount++;
    setTimeout(startExplosions, 500);
  }
  function animateSplash() {
    splashCtx.clearRect(0, 0, splashCanvas.width, splashCanvas.height);
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.update();
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      p.draw(splashCtx);
    }
    if (particles.length > 0 || explosionCount < 3) requestAnimationFrame(animateSplash);
  }
  startExplosions();
  animateSplash();

  // ========== 粒子背景 ==========
  var bgCanvas = document.getElementById('particleCanvas');
  var bgCtx = bgCanvas.getContext('2d');
  var bgParticles = []; var particleEnabled = true;
  function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
  resizeBg(); window.addEventListener('resize', resizeBg);
  function BgParticle() { this.reset(true); }
  BgParticle.prototype.reset = function(initial) {
    if (initial) {
      this.x = Math.random() * bgCanvas.width; this.y = Math.random() * bgCanvas.height;
      this.speedX = (Math.random() - 0.5) * 0.5; this.speedY = (Math.random() - 0.5) * 0.5;
    } else {
      var side = Math.floor(Math.random() * 4);
      if (side === 0) { this.x = -10; this.y = Math.random() * bgCanvas.height; this.speedX = Math.abs((Math.random() - 0.5) * 0.5) + 0.1; this.speedY = (Math.random() - 0.5) * 0.5; }
      else if (side === 1) { this.x = bgCanvas.width + 10; this.y = Math.random() * bgCanvas.height; this.speedX = -(Math.abs((Math.random() - 0.5) * 0.5) + 0.1); this.speedY = (Math.random() - 0.5) * 0.5; }
      else if (side === 2) { this.x = Math.random() * bgCanvas.width; this.y = -10; this.speedX = (Math.random() - 0.5) * 0.5; this.speedY = Math.abs((Math.random() - 0.5) * 0.5) + 0.1; }
      else { this.x = Math.random() * bgCanvas.width; this.y = bgCanvas.height + 10; this.speedX = (Math.random() - 0.5) * 0.5; this.speedY = -(Math.abs((Math.random() - 0.5) * 0.5) + 0.1); }
    }
    this.size = Math.random() * 2 + 1; this.opacity = Math.random() * 0.5 + 0.2;
  };
  BgParticle.prototype.update = function() { this.x += this.speedX; this.y += this.speedY; if (this.x < -15 || this.x > bgCanvas.width + 15 || this.y < -15 || this.y > bgCanvas.height + 15) this.reset(false); };
  BgParticle.prototype.draw = function() { bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); bgCtx.fillStyle = 'rgba(255,255,255,' + this.opacity + ')'; bgCtx.fill(); };
  for (var i = 0; i < 100; i++) bgParticles.push(new BgParticle());
  function animateBg() { if (!particleEnabled) { requestAnimationFrame(animateBg); return; } bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height); for (var i = 0; i < bgParticles.length; i++) { bgParticles[i].update(); bgParticles[i].draw(); } requestAnimationFrame(animateBg); }
  animateBg();

  // ========== 系统核心元素 ==========
  var lockScreen = document.getElementById('lockScreen'), desktop = document.getElementById('desktop'), lockTimeEl = document.getElementById('lockTime'), lockDateEl = document.getElementById('lockDate'), fullscreenContainer = document.getElementById('fullscreenContainer'), fullscreenContent = document.getElementById('fullscreenContent'), desktopPage1 = document.getElementById('desktopPage1'), desktopPage2 = document.getElementById('desktopPage2'), toast = document.getElementById('toast'), notificationPanel = document.getElementById('notificationPanel'), navBar = document.getElementById('navBar'), particleWallpaper = document.getElementById('particleWallpaper');
  var isLocked = true, installedApps = new Map(), pendingInstallContent = null, selectedEmoji = '📄', fullscreenOpen = false, fscTimeout = null;
  function showToast(msg) { toast.textContent = msg; toast.style.opacity = '1'; clearTimeout(toast._t); toast._t = setTimeout(function() { toast.style.opacity = '0'; }, 1500); }
  function updateClock() { var n = new Date(); lockTimeEl.textContent = n.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false }); lockDateEl.textContent = n.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }); }
  updateClock(); setInterval(updateClock, 1000);

  // 锁屏（鼠标拖动模拟上滑）
  var lockStartY = 0, lockDragging = false;
  lockScreen.addEventListener('mousedown', function(e) { if (!isLocked) return; lockStartY = e.clientY; lockDragging = true; });
  window.addEventListener('mouseup', function(e) { if (lockDragging && isLocked && lockStartY - e.clientY > 55) { unlock(); } lockDragging = false; });
  function unlock() { isLocked = false; lockScreen.style.transform = 'translateY(-100%)'; lockScreen.style.pointerEvents = 'none'; desktop.classList.remove('hidden'); setTimeout(function() { lockScreen.classList.add('hidden'); }, 500); }

  // 通知面板（鼠标滚轮或点击打开）
  document.addEventListener('wheel', function(e) {
    if (isLocked || !fullscreenContainer.classList.contains('hidden')) return;
    if (e.deltaY < -20) notificationPanel.classList.add('open');
    else if (e.deltaY > 20) notificationPanel.classList.remove('open');
  });

  // 底部导航栏（鼠标移动到底部附近显示）
  document.addEventListener('mousemove', function(e) {
    if (isLocked || fullscreenContainer.classList.contains('hidden')) return;
    if (window.innerHeight - e.clientY < 40) navBar.classList.add('visible');
    else navBar.classList.remove('visible');
  });
  document.getElementById('navExitBtn').addEventListener('click', closeFullscreen);
  document.getElementById('forceExitBtn').addEventListener('click', function() { forceCloseFullscreen(); showToast('已强制退出'); });

  function openFullscreenApp(type, data) {
    if (fullscreenOpen) forceCloseFullscreen();
    fullscreenOpen = true;
    fullscreenContainer.classList.remove('hidden');
    desktop.classList.add('hidden');
    fullscreenContent.innerHTML = '';
    var iframe = document.createElement('iframe');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms allow-modals');
    iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000;';
    var htmlContent = '';
    if (type === 'html') htmlContent = data.html;
    else if (type === 'browser') htmlContent = BROWSER_HTML;
    else if (type === 'store') htmlContent = STORE_HTML;
    else if (type === 'feixin') { iframe.src = 'feixin.html'; iframe.removeAttribute('sandbox'); }
    else if (type === 'calc') htmlContent = CALC_HTML;
    else if (type === 'clock') htmlContent = CLOCK_HTML;
    if (type !== 'feixin') iframe.srcdoc = htmlContent;
    fullscreenContent.appendChild(iframe);
  }
  function closeFullscreen() {
    if (!fullscreenOpen) return;
    fullscreenOpen = false;
    fullscreenContainer.classList.add('hidden');
    fullscreenContent.innerHTML = '';
    desktop.classList.remove('hidden');
    navBar.classList.remove('visible');
  }
  function forceCloseFullscreen() { closeFullscreen(); }

  // ========== 桌面图标（电脑端：单击打开，右键删除，鼠标拖拽排序） ==========
  function createDesktopIcon(app, forceContainer) {
    var existing = document.querySelector('.app-icon[data-appid="' + app.id + '"]');
    if (existing) existing.remove();
    var container = forceContainer || (desktopPage1.querySelectorAll('.app-icon').length >= 12 ? desktopPage2 : desktopPage1);
    var div = document.createElement('div'); div.className = 'app-icon'; div.dataset.appid = app.id;
    div.innerHTML = '<div class="icon-img">' + (app.icon || '📄') + '</div><span>' + app.name + '</span><div class="delete-btn">✕</div>';
    var delBtn = div.querySelector('.delete-btn');

    // 单击打开应用
    div.addEventListener('click', function(e) { e.stopPropagation(); launchApp(app); });
    // 右键显示删除按钮
    div.addEventListener('contextmenu', function(e) { e.preventDefault(); delBtn.style.display = 'flex'; });
    // 点击其他位置隐藏删除按钮
    document.addEventListener('click', function(e) { if (e.target !== delBtn && !delBtn.contains(e.target)) delBtn.style.display = 'none'; });
    delBtn.addEventListener('click', function(e) { e.stopPropagation(); e.preventDefault(); if (confirm('确定删除"' + app.name + '"吗？')) { installedApps.delete(app.id); div.remove(); saveInstalledApps(); showToast('已删除'); } });

    // 拖拽排序（鼠标）
    var isDragging = false, startX, startY, offsetX, offsetY, dragClone;
    div.addEventListener('mousedown', function(e) {
      if (e.button === 2) return; // 右键不触发
      e.preventDefault();
      startX = e.clientX; startY = e.clientY;
      isDragging = false;
      var rect = div.getBoundingClientRect();
      offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top;
      function onMouseMove(e) {
        if (!isDragging) {
          if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
            isDragging = true;
            dragClone = div.cloneNode(true);
